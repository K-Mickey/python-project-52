{% extends 'layout.html' %}
{% load i18n %}
{% load django_bootstrap5 %}

{% block content %}
  <div class="card mt-5">
    <div class="card-header p-4">
      <h1 class="display-4">{{ title }}</h1>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% bootstrap_button button_text button_type="submit" button_class="btn btn-primary" %}
      </form>
    </div>
  </div>
{% endblock %}
